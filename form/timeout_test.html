<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment QR & Status Inquiry</title>
    <link rel="stylesheet" href="../../css/form.css">
    <style>
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            background-color: #f4f4f9; 
            font-family: sans-serif; 
        }
        .payment-container { 
            width: 400px; 
            text-align: center; 
        }
        .qr-card { 
            background: #fff; 
            padding: 30px; 
            border-radius: 12px; 
            border: 1px solid #ccc; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        #qr-code-image { 
            width: 220px; 
            height: 220px; 
            margin: 10px auto; 
            display: none; 
            border: 1px solid #eee; 
        }
        .timer-display { 
            font-size: 32px; 
            font-weight: bold; 
            color: #d9534f; 
            margin: 10px 0; 
            font-family: monospace; 
        }
        .input-group { 
            text-align: left; 
            margin-bottom: 15px; 
        }
        .input-group label { 
            display: block; 
            font-size: 11px; 
            font-weight: bold; 
            margin-bottom: 5px; 
            color: #777; 
            letter-spacing: 0.5px; 
        }
        .input-group input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 14px; 
            background: #fafafa; 
        }
        .input-group input:focus { 
            border-color: #000; 
            outline: none; 
            background: #fff; 
        }
        .btn-check { 
            margin-top: 10px; 
            padding: 14px; 
            background: #000; 
            color: #fff; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            width: 100%; 
            font-weight: bold; 
            font-size: 16px; 
        }
        .btn-check:hover { 
            background: #333; 
        }
        .btn-check:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        #inquiry-status-text { 
            font-size: 14px; 
            font-weight: bold; 
            margin-top: 15px; 
            min-height: 20px; 
        }
        .countdown-alert {
            font-size: 13px;
            color: #555;
            margin-top: 10px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="payment-container">
        <div class="qr-card">
            <h2 style="margin-top: 0;">DuitNow QR</h2>
            
            <div id="qr-section" style="display: none;">
                <p style="font-size: 14px; color: #555;">Scan with your mobile banking app</p>
                <img id="qr-code-image" src="">
                <div id="countdown-display" class="timer-display">00:00</div>
                <p style="font-size: 12px; color: #999; margin-bottom: 20px;">Ref: <span id="ref-display"></span></p>
                <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
            </div>

            <div class="input-group">
                <label>TRANSACTION ID</label>
                <input type="text" id="manual_trxn_id" placeholder="PAGUAT...">
            </div>

            <div class="input-group">
                <label>AMOUNT (IN CENTS - e.g. 100 = RM1.00)</label>
                <input type="number" id="manual_amount" placeholder="100">
            </div>

            <button id="btn-submit" class="btn-check" onclick="startStatusCheck()">Check Status Now</button>
            <p id="inquiry-status-text"></p>
            <p id="countdown-text" class="countdown-alert"></p>
        </div>
    </div>

    <!-- Hidden form submitted silently inside the target iframe -->
    <form id="inq-form" method="post" action="https://devlinkv2.paydee.co/mpigw/mpReq" target="inq_frame" style="display:none;">
        <input type="hidden" name="MPI_RETURN_URL" value="https://payment-page-virid.vercel.app/api/callback">
        <input type="hidden" name="MPI_TRANS_TYPE" value="INQ">
        <input type="hidden" name="MPI_MERC_ID" value="000000000000003">
        <input type="hidden" name="MPI_PURCH_DATE" id="INQ_PURCH_DATE">
        <input type="hidden" name="MPI_TRXN_ID" id="INQ_TRXN_ID">
        <input type="hidden" name="MPI_ORI_TRXN_ID" id="INQ_ORI_TRXN_ID">
        <input type="hidden" name="MPI_PURCH_CURR" value="458">
        <input type="hidden" name="MPI_PURCH_AMT" id="INQ_PURCH_AMT">
        <textarea name="MPI_MAC" id="INQ_MAC"></textarea>
    </form>
    
    <iframe name="inq_frame" style="display:none;"></iframe>

    <!-- Load the customized handling script -->
    <script src="inquiry-handler.js"></script>
    <script>
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const qr = params.get('MPI_QR_CODE');
            const expiry = params.get('MPI_QR_EXPIRY_SECONDS');
            const tid = params.get('MPI_TRXN_ID') || params.get('MPI_TXN_ID');
            const amt = params.get('MPI_PURCH_AMT');

            // 1. Fill inputs automatically if values are in URL
            if (tid) document.getElementById('manual_trxn_id').value = tid;
            if (amt) document.getElementById('manual_amount').value = amt;

            // 2. Setup QR display and Gateway Expiry Timer
            if (qr && expiry) {
                document.getElementById('qr-code-image').src = "data:image/png;base64," + qr;
                document.getElementById('qr-code-image').style.display = "block";
                document.getElementById('qr-section').style.display = "block";
                document.getElementById('ref-display').innerText = tid;
                startGatewayExpiryTimer(parseInt(expiry));
            }
        };

        function startGatewayExpiryTimer(seconds) {
            let timer = seconds;
            const display = document.getElementById('countdown-display');
            const countdown = setInterval(function () {
                let minutes = parseInt(timer / 60, 10);
                let seconds = parseInt(timer % 60, 10);

                minutes = minutes < 10 ? "0" + minutes : minutes;
                seconds = seconds < 10 ? "0" + seconds : seconds;

                display.textContent = minutes + ":" + seconds;

                if (--timer < 0) {
                    clearInterval(countdown);
                    display.textContent = "EXPIRED";
                    display.style.color = "#888";
                }
            }, 1000);
        }
    </script>
</body>
</html>
