<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checking Payment Status...</title>
    <style>
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            background-color: #f4f4f9; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; 
        }
        .status-container { 
            width: 400px; 
            text-align: center; 
            background: #fff; 
            padding: 40px; 
            border-radius: 12px; 
            border: 1px solid #ddd; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #000;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #inquiry-status-text { 
            font-size: 16px; 
            font-weight: bold; 
            color: #333;
            margin: 10px 0;
            min-height: 24px; 
        }
        #countdown-text {
            font-size: 13px;
            color: #d9534f;
            margin-top: 15px;
            font-weight: bold;
        }
        .ref-text {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="status-container">
        <!-- Visual loading spinner -->
        <div class="spinner" id="status-spinner"></div>
        
        <p id="inquiry-status-text">Initializing security checks...</p>
        <p class="ref-text">Transaction ID: <span id="ref-display">Loading...</span></p>
        <p id="countdown-text"></p>
    </div>

    <!-- Hidden form submitted inside the background iframe -->
    <form id="inq-form" method="post" action="https://devlinkv2.paydee.co/mpigw/mpReq" target="inq_frame" style="display:none;">
        <input type="hidden" name="MPI_RETURN_URL" value="https://payment-page-virid.vercel.app/api/callback">
        <input type="hidden" name="MPI_TRANS_TYPE" value="INQ">
        <input type="hidden" name="MPI_MERC_ID" value="000000000000003">
        <input type="hidden" name="MPI_PURCH_DATE" id="INQ_PURCH_DATE">
        <input type="hidden" name="MPI_TRXN_ID" id="INQ_TRXN_ID">
        <input type="hidden" name="MPI_ORI_TRXN_ID" id="INQ_ORI_TRXN_ID">
        <input type="hidden" name="MPI_PURCH_CURR" value="458">
        <input type="hidden" name="MPI_PURCH_AMT" id="INQ_PURCH_AMT">
        <textarea name="MPI_MAC" id="INQ_MAC"></textarea>
    </form>
    
    <iframe name="inq_frame" style="display:none;"></iframe>

    <!-- Load the background polling mechanism -->
    <script src="inquiry-handler.js"></script>
    <script>
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const tid = params.get('MPI_TRXN_ID');
            const amt = params.get('MPI_PURCH_AMT');

            if (tid && amt) {
                document.getElementById('ref-display').innerText = tid;
                
                // AUTO-START INQUIRY LOOP
                autoTriggerStatusCheck(tid, amt);
            } else {
                document.getElementById('status-spinner').style.display = 'none';
                document.getElementById('inquiry-status-text').innerText = "Error: Missing transaction properties.";
                document.getElementById('inquiry-status-text').style.color = "red";
            }
        };
    </script>
</body>
</html>
